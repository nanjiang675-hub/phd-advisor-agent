<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PhD 导师发现 Agent</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--ink:#152034;--muted:#667085;--blue:#3157d5;--line:#e5eaf2}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,"Microsoft YaHei",sans-serif}
    header{background:linear-gradient(125deg,#172554,#3157d5);color:#fff;padding:38px max(5vw,24px)}
    header h1{margin:0 0 8px;font-size:30px}header p{margin:0;color:#dbe6ff}
    main{max-width:1180px;margin:24px auto;padding:0 20px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 4px 18px #2233550b}
    .number{font-size:28px;font-weight:750;margin-top:5px}.label{color:var(--muted);font-size:13px}
    .toolbar{display:flex;gap:10px;align-items:center;margin:18px 0}.toolbar input{flex:1;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px}
    button{border:0;border-radius:10px;background:var(--blue);color:#fff;padding:12px 16px;cursor:pointer}
    .table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:900px}th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line);font-size:13px}th{color:var(--muted);background:#f9fbfe}
    .score{font-weight:750;color:var(--blue)}.tag{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#3949ab}
    .empty{text-align:center;padding:56px 20px;color:var(--muted)}a{color:var(--blue)}
    footer{max-width:1180px;margin:18px auto 40px;padding:0 20px;color:var(--muted);font-size:12px}
    @media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <header><h1>PhD 导师发现 Agent</h1><p>美国高校 · Computer Science / Statistics · Machine Learning / Deep Learning</p></header>
  <main>
    <section class="stats">
      <div class="card"><div class="label">导师总数</div><div class="number" id="total">0</div></div>
      <div class="card"><div class="label">高匹配导师</div><div class="number" id="matched">0</div></div>
      <div class="card"><div class="label">明确招生</div><div class="number" id="open">0</div></div>
      <div class="card"><div class="label">已联系</div><div class="number" id="contacted">0</div></div>
    </section>
    <div class="toolbar"><input id="search" placeholder="搜索学校、导师、院系或研究方向"><button onclick="loadData()">刷新数据</button></div>
    <section class="card table-wrap">
      <table><thead><tr><th>导师</th><th>学校</th><th>院系</th><th>研究方向</th><th>招生状态</th><th>匹配分数</th><th>证据</th></tr></thead><tbody id="rows"></tbody></table>
      <div id="empty" class="empty">还没有真实数据。请先填写 input 文件夹中的学校和研究背景，然后运行采集任务。</div>
    </section>
  </main>
  <footer>所有招生判断必须以导师或院系官网证据为准。本工具默认不发送邮件。</footer>
  <script>
    let records=[];
    function parseCSV(text){
      const rows=[];let row=[],field='',quote=false;
      for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&quote&&n==='"'){field+='"';i++}else if(c==='"'){quote=!quote}else if(c===','&&!quote){row.push(field);field=''}else if((c==='\n'||c==='\r')&&!quote){if(c==='\r'&&n==='\n')i++;row.push(field);if(row.some(x=>x))rows.push(row);row=[];field=''}else field+=c}row.push(field);if(row.some(x=>x))rows.push(row);
      if(rows.length<2)return[];const h=rows[0].map(x=>x.replace(/^\uFEFF/,''));return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,r[i]||''])));
    }
    function render(){
      const q=document.querySelector('#search').value.toLowerCase();const shown=records.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q));
      document.querySelector('#rows').innerHTML=shown.map(r=>`<tr><td><strong>${esc(r.name)}</strong></td><td>${esc(r.school)}</td><td>${esc(r.department)}</td><td>${esc(r.research_text||r.match_reasons)}</td><td><span class="tag">${esc(r.admissions_status||'unknown')}</span></td><td class="score">${esc(r.match_score||'0')}</td><td>${r.evidence_url?`<a href="${esc(r.evidence_url)}" target="_blank">查看来源</a>`:'待核验'}</td></tr>`).join('');
      document.querySelector('#empty').style.display=shown.length?'none':'block';
      total.textContent=records.length;matched.textContent=records.filter(r=>Number(r.match_score)>=65).length;open.textContent=records.filter(r=>r.admissions_status==='confirmed_open').length;contacted.textContent=records.filter(r=>r.contact_status&&r.contact_status!=='not_contacted').length;
    }
    function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    async function loadData(){try{records=await (await fetch('../api/faculty?'+Date.now())).json();render()}catch(e){console.error(e)}}
    document.querySelector('#search').addEventListener('input',render);loadData();
  </script>
</body></html>
