services:
  web:
    build: .
    ports: ["8765:8765"]
    environment:
      DATABASE_PATH: /data/faculty.sqlite
      NO_BROWSER: "1"
    env_file: [.env]
    volumes: ["advisor-data:/data"]
  worker:
    build: .
    command: ["python","agent.py","scheduler"]
    environment:
      DATABASE_PATH: /data/faculty.sqlite
      SCAN_INTERVAL_HOURS: "168"
      NO_BROWSER: "1"
    env_file: [.env]
    volumes: ["advisor-data:/data"]
volumes:
  advisor-data:
